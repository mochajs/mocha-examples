name: Tests
'on':
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  schedule:
    - cron: '0 6 * * 0'

jobs:
  test-node-v14:
    uses: ./.github/workflows/test-workflow.yml
    with:
      node-version: 14
      
  test-node-v16:
    uses: ./.github/workflows/test-workflow.yml
    with:
      node-version: 16

  test-node-v18:
    uses: ./.github/workflows/test-workflow.yml
    with:
      node-version: 18